      var noIdH2s = cardH2s.filter(function(el){ return !el.id; });
      if (noIdH2s[0]) noIdH2s[0].textContent = loc.uiH2Overview;
      if (noIdH2s[1]) noIdH2s[1].textContent = loc.uiH2HowWorks;
      if (noIdH2s[2]) noIdH2s[2].textContent = loc.uiH2About;

      var bList = document.getElementById('benefits-list');
      if (bList) bList.setAttribute('aria-label', loc.uiBenefitsAria);
      var fList = document.getElementById('faq-list');
      if (fList) fList.setAttribute('aria-label', loc.uiFaqAria);
      var affBadge = document.querySelector('.affiliate-badge');
      if (affBadge) affBadge.setAttribute('aria-label', loc.uiAffBadgeAria);
      var ctaBlock = document.getElementById('cta-block');
      if (ctaBlock) ctaBlock.setAttribute('aria-label', loc.uiCtaRegionAria);

      document.getElementById('how-it-works').innerHTML   = r(loc.uiHowItWorks);
      document.getElementById('about-site').innerHTML     = r(loc.uiAboutSite);
      document.getElementById('affiliate-disclaimer').innerHTML = r(loc.uiAffDisclaimer);
      var cardVisitLabel = document.getElementById('card-visit-label');
      if (cardVisitLabel) cardVisitLabel.textContent = loc.uiCardVisitLabel;
      document.getElementById('cta-label').textContent    = r(loc.uiCtaLabel);
      document.getElementById('cta-msg').textContent      = loc.uiCtaMsgAccept;
      var ctaLinkEl = document.getElementById('cta-link');
      if (ctaLinkEl) ctaLinkEl.setAttribute('aria-label', r(loc.uiCtaAria));

      var hBen = document.getElementById('heading-benefits');
      if (hBen) hBen.textContent = r(loc.uiBenefitsHeading);
    }

// ─────────────────────────────────────────────

// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
// APPLY CONFIG
// ─────────────────────────────────────────────
    (function applyConfig() {
      var c = window.SITE_CONFIG;
      if (!c) { document.title = 'ERROR: config not found'; return; }

      var name    = c.productName  || '';
      var url     = c.productUrl   || '#';
      var sDesc   = c.shortDesc    || '';
      var lDesc   = c.longDesc     || '';
      var bens    = c.benefits     || [];
      var aff     = c.affiliateName  || '';
      var co      = c.companyName    || '';
      var email   = c.privacyEmail   || '';
      var niche   = c.productNiche   || '';
      var adTitle = c.adTitle        || '';
      var adDesc  = c.adDescription  || sDesc;
      var audTxt  = c.targetAudience || '';
      var helpTxt = c.howItHelps     || '';
      var faqData = c.faq            || [];
      var coLabel = co ? aff + ' (' + co + ')' : aff;
      var jk  = c.jurisdiction || 'US';
      var jur = JURISDICTIONS[jk] || JURISDICTIONS['INT'];
      var loc = LOCALES['EN'];

      document.documentElement.lang = LANG_MAP[jk] || 'en';

      _ui = loc;

      var kw0 = (c.adKeywords && c.adKeywords.length > 0) ? c.adKeywords[0] : '';

      applyUIStrings(loc, name, coLabel, kw0);

      // Meta tags
      var _titleRev = c.titleReverse === true;
      var h1Text    = adTitle ? (_titleRev ? adTitle + ' \u2013 ' + name : name + ' \u2013 ' + adTitle) : name + ' \u2013 Information and overview';
      var pageTitle = (adTitle ? (_titleRev ? adTitle + ' \u2013 ' + name : name + ' \u2013 ' + adTitle) : name) + ' | Information and cookie notice';
      var metaDesc  = adDesc || sDesc;
      document.getElementById('meta-title').textContent = pageTitle;
      document.title = pageTitle;
      document.getElementById('meta-desc').setAttribute('content', metaDesc);
      document.getElementById('og-title').setAttribute('content', pageTitle);
      document.getElementById('og-desc').setAttribute('content', metaDesc);
      document.getElementById('og-url').setAttribute('content', window.location.href);

      // Schema markup
      var schemaTypes = [{ '@type': 'WebPage', 'name': pageTitle, 'description': metaDesc, 'url': window.location.href, 'inLanguage': document.documentElement.lang }];
      if (faqData.length > 0) {
        schemaTypes.push({ '@type': 'FAQPage', 'mainEntity': faqData.map(function(item) {
          return { '@type': 'Question', 'name': item.q, 'acceptedAnswer': { '@type': 'Answer', 'text': item.a } };
        }) });
      }
      var schemaEl = document.getElementById('page-schema');
      if (schemaEl) schemaEl.textContent = JSON.stringify({ '@context': 'https://schema.org', '@graph': schemaTypes });

      var kws = c.adKeywords;
      if (kws && kws.length > 0) {
        var kwEl = document.getElementById('meta-keywords');
        if (kwEl) kwEl.setAttribute('content', kws.join(', '));
      }

      // Product card
      document.getElementById('product-heading').textContent    = h1Text;
      document.getElementById('product-short-desc').textContent = adDesc || sDesc;
      document.getElementById('product-long-desc').innerHTML    = lDesc;
      var cardVisitBtn = document.getElementById('card-visit-btn');
      if (cardVisitBtn) cardVisitBtn.href = url;

      // Benefits
      var list = document.getElementById('benefits-list');
      var checkSVG = '<svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true"><path d="M1.5 4.5l2 2 4-4" stroke="#CA7F8C" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      bens.forEach(function(b) {
        var li = document.createElement('li');
        li.innerHTML = '<span class="check-icon">' + checkSVG + '</span>' + b;
        list.appendChild(li);
      });

      // Target audience
      document.getElementById('target-audience').innerHTML = audTxt || (name + ' may be an option for people looking for information about ' + (niche || 'this type of product') + '. Always consult a qualified professional before using any product.');

      // How it helps
      document.getElementById('how-it-helps').innerHTML = helpTxt || ('This site was created to bring together key information about <strong>' + name + '</strong> in one place, making your research easier before visiting the manufacturer\'s official site.');

      // FAQ
      var faqList = document.getElementById('faq-list');
      if (faqData.length > 0) {
        faqData.forEach(function(item, i) {
          var li = document.createElement('li');
          li.className = 'faq-item';
          li.innerHTML =
            '<div class="faq-q"><span class="faq-q-marker" aria-hidden="true">' + (i + 1) + '</span>' +
            '<span>' + item.q + '</span></div>' +
            '<p class="faq-a">' + item.a + '</p>';
          faqList.appendChild(li);
        });
      } else {
        document.getElementById('heading-faq').style.display = 'none';
        faqList.style.display = 'none';
      }

      // CTA href
      var ctaLink = document.getElementById('cta-link');
      if (ctaLink) ctaLink.href = url;

      // Accept & Save Prefs hrefs (for tracker detection)
      var acceptLink = document.getElementById('btn-accept');
      if (acceptLink) acceptLink.href = url;
      var savePrefsLink = document.getElementById('btn-save-prefs');
      if (savePrefsLink) savePrefsLink.href = url;

      buildLegalSections(c);
    })();

// ─────────────────────────────────────────────
// CONSENT
// ─────────────────────────────────────────────
    var CONSENT_KEY = 'site_cookie_consent';

    function getConsent() {
      try { return JSON.parse(localStorage.getItem(CONSENT_KEY)); } catch(e) { return null; }
    }
    function saveConsent(data) {
      try {
        localStorage.setItem(CONSENT_KEY, JSON.stringify(data));
        localStorage.setItem(CONSENT_KEY + '_ts', new Date().toISOString());
      } catch(e) {}
    }
    function hideBanner() {
      var b = document.getElementById('cookie-banner');
      if (b) b.classList.add('hidden');
    }
    function showCTA(msg) {
      var block = document.getElementById('cta-block');
      if (!block) return;
      if (msg) document.getElementById('cta-msg').textContent = msg;
      block.classList.add('visible');
      block.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function acceptAll() {
      saveConsent({ type: 'all', analytics: true, ads: true });
      hideBanner();
      return true;
    }
    function rejectOptional() {
      saveConsent({ type: 'rejected_optional', analytics: false, ads: false });
      hideBanner();
      openProductSheet(true);
    }
    function savePrefs() {
      var analytics = document.getElementById('toggle-analytics').checked;
      var ads       = document.getElementById('toggle-ads').checked;
      saveConsent({ type: 'custom', analytics: analytics, ads: ads });
      hideBanner();
      return true;
    }
    function cancelPrefs() {
      var panel = document.getElementById('prefs-panel');
      var btn   = document.getElementById('btn-manage');
      panel.classList.remove('visible');
      btn.setAttribute('aria-expanded', 'false');
      btn.focus();
    }
    function togglePrefs() {
      var panel  = document.getElementById('prefs-panel');
      var btn    = document.getElementById('btn-manage');
      var isOpen = panel.classList.toggle('visible');
      btn.setAttribute('aria-expanded', String(isOpen));
      if (isOpen) {
        var first = panel.querySelector('input[type="checkbox"], button');
        if (first) first.focus();
      }
    }

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
    function toggleProductCard() {
      var card = document.getElementById('product-card');
      var isVisible = card.classList.toggle('visible');
      if (isVisible) {
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        var banner = document.getElementById('cookie-banner');
        if (banner && banner.classList.contains('hidden')) {
          banner.classList.remove('hidden');
        }
      }
    }

    function legalTitle(name) {
      var m = { privacy: _ui.uiMetaPrivacy, terms: _ui.uiMetaTerms, disclaimer: _ui.uiMetaDisclaimer };
      return (m[name]) || name;
    }

    function openProductSheet(fromReject) {
      var card = document.getElementById('product-card');
      if (!card) return;
      var clone = card.cloneNode(true);
      var closeDiv = clone.querySelector('.card-close');
      if (closeDiv) closeDiv.parentNode.removeChild(closeDiv);
      var body = document.getElementById('legal-sheet-body');
      var title = document.getElementById('legal-sheet-title');
      body.innerHTML = clone.innerHTML;
      title.textContent = (_ui && _ui.uiMetaProduct) ? _ui.uiMetaProduct : 'About the product';
      var sheet = document.getElementById('legal-sheet');
      sheet.classList.add('visible');
      sheet.dataset.fromReject = fromReject ? '1' : '';
      document.getElementById('cookie-banner').style.visibility = 'hidden';
    }

    function openLegalSheet(name) {
      var src = document.getElementById('section-' + name);
      if (!src) return;
      var body = document.getElementById('legal-sheet-body');
      var title = document.getElementById('legal-sheet-title');
      var card = src.querySelector('.legal-card');
      if (card) {
        var clone = card.cloneNode(true);
        var btn = clone.querySelector('.back-btn');
        if (btn) btn.parentNode.removeChild(btn);
        var h2 = clone.querySelector('h2');
        if (h2) h2.parentNode.removeChild(h2);
        body.innerHTML = clone.innerHTML;
      } else {
        body.innerHTML = src.innerHTML;
      }
      title.textContent = legalTitle(name);
      document.getElementById('legal-sheet').classList.add('visible');
      document.getElementById('cookie-banner').style.visibility = 'hidden';
    }

    function closeLegalSheet() {
      var sheet = document.getElementById('legal-sheet');
      var fromReject = sheet.dataset.fromReject === '1';
      sheet.classList.remove('visible');
      sheet.dataset.fromReject = '';
      var banner = document.getElementById('cookie-banner');
      if (fromReject) {
        banner.classList.remove('hidden');
        banner.style.visibility = '';
      } else {
        banner.style.visibility = '';
      }
      history.pushState(null, '', window.location.pathname);
    }

    function showMain() {
      closeLegalSheet();
      document.getElementById('product-card').classList.remove('visible');
    }
    function showSection(name) { openLegalSheet(name); }
    function navigateTo(name) {
      history.pushState(null, '', '#' + name);
      if (name === 'product') { openProductSheet(); }
      else { openLegalSheet(name); }
    }

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
    (function init() {
      var hash = window.location.hash;
      if (hash === '#privacy')         showSection('privacy');
      else if (hash === '#terms')      showSection('terms');
      else if (hash === '#disclaimer') showSection('disclaimer');
      else if (hash === '#product')    openProductSheet();

      // Always re-collect consent on each visit
      localStorage.removeItem(CONSENT_KEY);
      localStorage.removeItem(CONSENT_KEY + '_ts');

      requestAnimationFrame(function() {
        var card = document.getElementById('cookie-card');
        if (card) card.focus();
      });
    })();

    window.addEventListener('pageshow', function(e) {
      if (e.persisted) {
        var b = document.getElementById('cookie-banner');
        if (b) b.classList.remove('hidden');
      }
    });

    window.addEventListener('popstate', function() {
      var hash = window.location.hash;
      if (hash === '#privacy')         showSection('privacy');
      else if (hash === '#terms')      showSection('terms');
      else if (hash === '#disclaimer') showSection('disclaimer');
      else if (hash === '#product')    openProductSheet();
      else                             showMain();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var sheet = document.getElementById('legal-sheet');
        if (sheet && sheet.classList.contains('visible')) { closeLegalSheet(); return; }
        var p = document.getElementById('prefs-panel');
        if (p && p.classList.contains('visible')) cancelPrefs();
      }
    });

    document.getElementById('legal-sheet').addEventListener('click', function(e) {
      if (e.target === this) closeLegalSheet();
    });

  </script>
